{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h1 class="text-center mb-5">Contact Us</h1>

    <div class="row">

        <div class="col-md-6">

            <h4>Phone</h4>
            <p>+91 9876543210</p>

            <h4>Email</h4>
            <p>ambulance@gmail.com</p>

            <h4>Address</h4>
            <p>Patna, Bihar</p>

        </div>

        <div class="col-md-6">

            <form>

                <div class="mb-3">

                    <input type="text"
                           placeholder="Your Name"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <input type="email"
                           placeholder="Your Email"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <textarea class="form-control"
                              rows="5"
                              placeholder="Message"></textarea>

                </div>

                <button class="btn btn-danger">
                    Send Message
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
