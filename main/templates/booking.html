{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Book Ambulance
    </h1>

    <form method="POST"
          class="shadow p-4 rounded">

        {% csrf_token %}

        <div class="mb-3">

            <label>Name</label>

            <input type="text"
                   name="name"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Phone Number</label>

            <input type="text"
                   name="phone"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Pickup Location</label>

            <input type="text"
                   name="pickup_location"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Emergency Type</label>

            <select name="emergency_type"
                    class="form-control">

                <option>
                    ICU Ambulance
                </option>

                <option>
                    Oxygen Ambulance
                </option>

                <option>
                    Emergency Ambulance
                </option>

            </select>

        </div>

        <button type="submit"
                class="btn btn-danger">

            Submit

        </button>

    </form>

</div>

{% endblock %}
